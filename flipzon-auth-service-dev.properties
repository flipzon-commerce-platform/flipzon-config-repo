#flipzon-auth-service-dev properties file 
spring.application.name=flipzon-auth-service

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/flipzon_auth
spring.datasource.username=postgres
spring.datasource.password=0000
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=flipzon-secret-key-flipzon-secret-key-flipzon
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
